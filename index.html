<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palette Picks - Artistic Supply List</title>
  
  <!-- Import Artistic Fonts from Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  

  <div class="palette-picks-app">
    <header>
      <h1>My To-Do List</h1>
      <p>Plan your day, check the wins.</p>
    </header>

    <!-- The exact HTML structure required by your instructions -->
    <form id="shopping-form" class="input-section">
      <div class="art-input-wrapper">
        <label for="item-input">Enter a new supply or inspiration</label>
        <input type="text" id="item-input" placeholder="e.g., 1 Sack of Rice" autocomplete="off">
      </div>
      <button type="submit" class="btn-add">Add</button>
    </form>

    <ul id="list-container">
      <!-- Your beautiful, dynamic list items will appear here! -->
    </ul>
  </div>

  <script src="script.js">5</script>
</body>
</html>
